<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human-AI Jury Sepolia Deploy</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 40px auto;
        max-width: 860px;
        padding: 0 20px;
        background: #0b1020;
        color: #ecf2ff;
      }
      .card {
        background: #151b31;
        border: 1px solid #2a355e;
        border-radius: 16px;
        padding: 24px;
      }
      button {
        background: #7cf2c5;
        color: #07111f;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      pre {
        background: #0b1226;
        border-radius: 12px;
        padding: 16px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .muted {
        color: #9fb0d9;
      }
      a {
        color: #7cf2c5;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Human-AI Jury Sepolia Deploy</h1>
      <p class="muted">
        Deploys <code>ResolutionStorage</code> to Sepolia with the browser wallet.
      </p>
      <button id="deployButton">Deploy to Sepolia</button>
      <p id="status" class="muted">Ready.</p>
      <pre id="output">No deployment yet.</pre>
    </div>

    <script>
      const deployButton = document.getElementById("deployButton");
      const statusNode = document.getElementById("status");
      const outputNode = document.getElementById("output");

      function setStatus(message) {
        statusNode.textContent = message;
      }

      function setOutput(value) {
        outputNode.textContent = value;
      }

      function summarizeProviders() {
        if (!window.ethereum) {
          return { hasEthereum: false, providers: [] };
        }

        const providers = Array.isArray(window.ethereum.providers)
          ? window.ethereum.providers.map((provider) => ({
              isMetaMask: !!provider.isMetaMask,
              isCoinbaseWallet: !!provider.isCoinbaseWallet,
              keys: Object.keys(provider).slice(0, 12),
            }))
          : [
              {
                isMetaMask: !!window.ethereum.isMetaMask,
                isCoinbaseWallet: !!window.ethereum.isCoinbaseWallet,
                keys: Object.keys(window.ethereum).slice(0, 12),
              },
            ];

        return { hasEthereum: true, providers };
      }

      async function loadArtifact() {
        const [abiResponse, binResponse] = await Promise.all([
          fetch("../.sepolia-build/contracts_ResolutionStorage_sol_ResolutionStorage.abi"),
          fetch("../.sepolia-build/contracts_ResolutionStorage_sol_ResolutionStorage.bin"),
        ]);

        if (!abiResponse.ok || !binResponse.ok) {
          throw new Error("Failed to load contract artifact files.");
        }

        const abi = JSON.parse(await abiResponse.text());
        const bytecode = `0x${(await binResponse.text()).trim()}`;
        return { abi, bytecode };
      }

      function pickProvider() {
        if (!window.ethereum) {
          return null;
        }

        if (Array.isArray(window.ethereum.providers)) {
          const metamask = window.ethereum.providers.find(
            (provider) => provider && provider.isMetaMask
          );
          if (metamask) {
            return metamask;
          }
        }

        if (window.ethereum.isMetaMask) {
          return window.ethereum;
        }

        return window.ethereum;
      }

      async function deploy() {
        const injectedProvider = pickProvider();
        if (!injectedProvider) {
          throw new Error("MetaMask is not available in this browser.");
        }

        deployButton.disabled = true;
        setStatus("Connecting wallet...");

        const provider = new ethers.BrowserProvider(injectedProvider);
        let accounts = await provider.send("eth_accounts", []);
        if (!accounts || accounts.length === 0) {
          accounts = await provider.send("eth_requestAccounts", []);
        }

        const network = await provider.getNetwork();
        if (Number(network.chainId) !== 11155111) {
          setStatus("Switching wallet to Sepolia...");
          await provider.send("wallet_switchEthereumChain", [{ chainId: "0xaa36a7" }]);
        }

        setStatus("Loading artifact...");
        const { abi, bytecode } = await loadArtifact();

        setStatus("Preparing deployment transaction...");
        const signer = await provider.getSigner();
        const factory = new ethers.ContractFactory(abi, bytecode, signer);
        const contract = await factory.deploy();

        setOutput(
          JSON.stringify(
            {
              deployTxHash: contract.deploymentTransaction().hash,
              contractAddress: contract.target,
            },
            null,
            2
          )
        );

        setStatus("Waiting for confirmation...");
        await contract.waitForDeployment();

        const address = await contract.getAddress();
        setStatus("Deployment confirmed.");
        setOutput(
          JSON.stringify(
            {
              network: "sepolia",
              contractAddress: address,
              deployTxHash: contract.deploymentTransaction().hash,
              explorer: `https://sepolia.etherscan.io/address/${address}`,
              transaction: `https://sepolia.etherscan.io/tx/${contract.deploymentTransaction().hash}`,
            },
            null,
            2
          )
        );
      }

      deployButton.addEventListener("click", async () => {
        try {
          await deploy();
        } catch (error) {
          setStatus("Deployment failed.");
          setOutput(error instanceof Error ? error.stack || error.message : String(error));
          deployButton.disabled = false;
        }
      });

      setOutput(JSON.stringify(summarizeProviders(), null, 2));
    </script>
  </body>
</html>
